name: ourmap
description: A Gift — Our Memory Map
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Image/video picking from gallery
  image_picker: ^1.1.2

  # Video playback
  video_player: ^2.8.6
  chewie: ^1.8.1

  # Fonts
  google_fonts: ^6.2.1

  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

  # Unique IDs
  uuid: ^4.4.0

  # Intl for date formatting
  intl: ^0.19.0

  # Audio
  audioplayers: ^6.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/App_Sound.mp3
    - assets/background.png
